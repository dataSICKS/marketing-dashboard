openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: newsletter
    description: Newsletter report operations
  - name: efo
    description: EFO CVR report operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /newsletter/sync:
    post:
      operationId: syncNewsletter
      tags: [newsletter]
      summary: Sync newsletter data from Google Sheets
      description: Fetches latest data from the calc sheet and returns it
      responses:
        "200":
          description: Synced newsletter rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSyncResult"
        "500":
          description: Sync failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /newsletter/data:
    get:
      operationId: getNewsletterData
      tags: [newsletter]
      summary: Get newsletter report data
      description: Returns aggregated newsletter metrics grouped by the specified dimension
      parameters:
        - name: groupBy
          in: query
          required: false
          schema:
            type: string
            enum: [day, week, month, template]
            default: day
          description: Aggregation dimension
        - name: dateFrom
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter start date (YYYY/MM/DD)
        - name: dateTo
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter end date (YYYY/MM/DD)
        - name: segment
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter by segment name (comma-separated for multiple)
        - name: compareFrom
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Comparison period start date (YYYY/MM/DD)
        - name: compareTo
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Comparison period end date (YYYY/MM/DD)
      responses:
        "200":
          description: Newsletter report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterReportResponse"
        "500":
          description: Fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /newsletter/segments:
    get:
      operationId: getNewsletterSegments
      tags: [newsletter]
      summary: Get available segments
      description: Returns a list of all unique segment values in the data
      responses:
        "200":
          description: Segment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSegmentsResponse"
        "500":
          description: Fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /efo/sync:
    post:
      operationId: syncEfo
      tags: [efo]
      summary: Sync EFO data from Google Sheets
      description: Fetches latest EFO access/cv and exit scenario data from Google Sheets
      responses:
        "200":
          description: Synced EFO data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfoSyncResult"
        "500":
          description: Sync failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /efo/data:
    get:
      operationId: getEfoData
      tags: [efo]
      summary: Get EFO CVR report data
      description: Returns aggregated EFO metrics and exit scenario funnel
      parameters:
        - name: groupBy
          in: query
          required: false
          schema:
            type: string
            enum: [day, week, month]
            default: day
          description: Aggregation dimension
        - name: dateFrom
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter start date (YYYY/MM/DD)
        - name: dateTo
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter end date (YYYY/MM/DD)
      responses:
        "200":
          description: EFO report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfoReportResponse"
        "500":
          description: Fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    NewsletterRow:
      type: object
      properties:
        deliveryYearMonth:
          type: string
          description: 配信年月 (YYYY/MM)
        deliveryWeek:
          type: string
          description: 配信月週 (e.g. 9月2W)
        deliveryDate:
          type: string
          description: 配信日 (YYYY/MM/DD)
        scenarioName:
          type: string
          description: シナリオ名
        segment:
          type: string
          description: セグメント
        deliveryMethod:
          type: string
          description: 配信方法
        templateName:
          type: string
          description: テンプレート名
        subject:
          type: string
          description: 件名
        deliveryCount:
          type: number
          description: 配信数
        openCount:
          type: number
          description: 開封数
        clickCount:
          type: number
          description: クリック数
        cvCount:
          type: number
          description: CV数
      required:
        - deliveryYearMonth
        - deliveryWeek
        - deliveryDate
        - scenarioName
        - segment
        - deliveryMethod
        - templateName
        - subject
        - deliveryCount
        - openCount
        - clickCount
        - cvCount

    NewsletterSyncResult:
      type: object
      properties:
        rowCount:
          type: number
          description: Number of rows synced
        syncedAt:
          type: string
          description: ISO timestamp of sync
      required:
        - rowCount
        - syncedAt

    NewsletterMetrics:
      type: object
      properties:
        label:
          type: string
          description: Group label (date, week, month, or template name)
        subject:
          type: ["string", "null"]
          description: 件名（テンプレ別・日別など行レベルで意味を持つ場合）
        segment:
          type: ["string", "null"]
          description: セグメント名（セグメント別集計の場合）
        deliveryCount:
          type: number
        openCount:
          type: number
        clickCount:
          type: number
        cvCount:
          type: number
        openRate:
          type: number
          description: Open rate (openCount / deliveryCount)
        clickRate:
          type: number
          description: Click rate (clickCount / deliveryCount)
        cvr:
          type: number
          description: Conversion rate (cvCount / deliveryCount)
        prevDeliveryCount:
          type: ["number", "null"]
          description: 前期間の配信数
        prevOpenRate:
          type: ["number", "null"]
          description: 前期間の開封率
        prevClickRate:
          type: ["number", "null"]
          description: 前期間のクリック率
        prevCvr:
          type: ["number", "null"]
          description: 前期間のCVR
      required:
        - label
        - deliveryCount
        - openCount
        - clickCount
        - cvCount
        - openRate
        - clickRate
        - cvr

    NewsletterSegmentGroup:
      type: object
      properties:
        segment:
          type: string
          description: セグメント名
        items:
          type: array
          items:
            $ref: "#/components/schemas/NewsletterMetrics"
        summary:
          $ref: "#/components/schemas/NewsletterMetrics"
      required:
        - segment
        - items
        - summary

    NewsletterReportResponse:
      type: object
      properties:
        groupBy:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/NewsletterMetrics"
        segmentGroups:
          type: array
          items:
            $ref: "#/components/schemas/NewsletterSegmentGroup"
          description: セグメント別グループ（セグメントフィルタ複数指定時）
        summary:
          $ref: "#/components/schemas/NewsletterMetrics"
        lastSyncedAt:
          type: ["string", "null"]
        availableSegments:
          type: array
          items:
            type: string
          description: 選択可能なセグメント一覧
      required:
        - groupBy
        - items
        - summary
        - lastSyncedAt
        - availableSegments

    NewsletterSegmentsResponse:
      type: object
      properties:
        segments:
          type: array
          items:
            type: string
      required:
        - segments

    EfoSyncResult:
      type: object
      properties:
        accessCvRowCount:
          type: number
        exitScenarioRowCount:
          type: number
        syncedAt:
          type: string
      required:
        - accessCvRowCount
        - exitScenarioRowCount
        - syncedAt

    EfoMetrics:
      type: object
      properties:
        label:
          type: string
        accessCount:
          type: number
        cvCount:
          type: number
        cvr:
          type: number
      required:
        - label
        - accessCount
        - cvCount
        - cvr

    EfoExitScenarioCount:
      type: object
      properties:
        scenario:
          type: string
        count:
          type: number
      required:
        - scenario
        - count

    EfoReportResponse:
      type: object
      properties:
        groupBy:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/EfoMetrics"
        summary:
          $ref: "#/components/schemas/EfoMetrics"
        exitScenarios:
          type: array
          items:
            $ref: "#/components/schemas/EfoExitScenarioCount"
          description: 離脱シナリオ別件数（ファネル順）
        lastSyncedAt:
          type: ["string", "null"]
      required:
        - groupBy
        - items
        - summary
        - exitScenarios
        - lastSyncedAt
