openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: newsletter
    description: Newsletter report operations
  - name: efo
    description: EFO CVR report operations
  - name: clarity
    description: Microsoft Clarity heatmap scroll depth data
  - name: campaigns
    description: Marketing campaign calendar
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /newsletter/sync:
    post:
      operationId: syncNewsletter
      tags: [newsletter]
      summary: Sync newsletter data from Google Sheets
      description: Fetches latest data from the calc sheet and returns it
      responses:
        "200":
          description: Synced newsletter rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSyncResult"
        "500":
          description: Sync failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /newsletter/data:
    get:
      operationId: getNewsletterData
      tags: [newsletter]
      summary: Get newsletter report data
      description: Returns aggregated newsletter metrics grouped by the specified dimension
      parameters:
        - name: groupBy
          in: query
          required: false
          schema:
            type: string
            enum: [day, week, month, template]
            default: day
          description: Aggregation dimension
        - name: dateFrom
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter start date (YYYY/MM/DD)
        - name: dateTo
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter end date (YYYY/MM/DD)
        - name: segment
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter by segment name (comma-separated for multiple)
        - name: compareFrom
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Comparison period start date (YYYY/MM/DD)
        - name: compareTo
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Comparison period end date (YYYY/MM/DD)
      responses:
        "200":
          description: Newsletter report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterReportResponse"
        "500":
          description: Fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /newsletter/change-events:
    get:
      operationId: getNewsletterChangeEvents
      tags: [newsletter]
      summary: Get template/subject change events
      description: Returns dates when email subject or template name changed, used for before/after comparison
      parameters:
        - name: scenarioName
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter by scenario name
        - name: segment
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter by segment name
      responses:
        "200":
          description: Change events list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterChangeEventsResponse"
        "500":
          description: Fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /newsletter/segments:
    get:
      operationId: getNewsletterSegments
      tags: [newsletter]
      summary: Get available segments
      description: Returns a list of all unique segment values in the data
      responses:
        "200":
          description: Segment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSegmentsResponse"
        "500":
          description: Fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clarity/files:
    get:
      operationId: getClarityFiles
      tags: [clarity]
      summary: List available Clarity heatmap files
      description: Returns available dates and ad codes stored in Supabase Storage
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Date folder to list (YYYY-MM-DD). Omit to get all available dates.
      responses:
        "200":
          description: Available dates and ad codes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClarityFilesResponse"
        "500":
          description: Fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clarity/scroll:
    get:
      operationId: getClarityScroll
      tags: [clarity]
      summary: Get scroll depth data for an ad code
      description: Returns scroll depth visitor counts for Desktop and/or Mobile devices
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
          description: Date folder (YYYY-MM-DD)
        - name: adCode
          in: query
          required: true
          schema:
            type: string
          description: Ad code to fetch scroll data for
      responses:
        "200":
          description: Scroll depth data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClarityScrollResponse"
        "400":
          description: Missing required parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /efo/filters:
    get:
      operationId: getEfoFilters
      tags: [efo]
      summary: Get available EFO filter values
      description: Returns unique profile names and ad codes active in the given date range
      parameters:
        - name: dateFrom
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter start date (YYYY-MM-DD)
        - name: dateTo
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter end date (YYYY-MM-DD)
      responses:
        "200":
          description: Available filter values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfoFilters"
        "500":
          description: Fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /efo/sync:
    post:
      operationId: syncEfo
      tags: [efo]
      summary: Sync EFO data from Google Sheets
      description: Fetches latest EFO access/cv and exit scenario data from Google Sheets
      responses:
        "200":
          description: Synced EFO data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfoSyncResult"
        "500":
          description: Sync failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /efo/data:
    get:
      operationId: getEfoData
      tags: [efo]
      summary: Get EFO CVR report data
      description: Returns aggregated EFO metrics and exit scenario funnel
      parameters:
        - name: groupBy
          in: query
          required: false
          schema:
            type: string
            enum: [day, week, month, template]
            default: day
          description: Aggregation dimension
        - name: dateFrom
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter start date (YYYY/MM/DD)
        - name: dateTo
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter end date (YYYY/MM/DD)
        - name: profileName
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter by profile name
        - name: adCode
          in: query
          required: false
          schema:
            type: ["string", "null"]
          description: Filter by ad code
      responses:
        "200":
          description: EFO report data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfoReportResponse"
        "500":
          description: Fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    NewsletterRow:
      type: object
      properties:
        deliveryYearMonth:
          type: string
          description: 配信年月 (YYYY/MM)
        deliveryWeek:
          type: string
          description: 配信月週 (e.g. 9月2W)
        deliveryDate:
          type: string
          description: 配信日 (YYYY/MM/DD)
        scenarioName:
          type: string
          description: シナリオ名
        segment:
          type: string
          description: セグメント
        deliveryMethod:
          type: string
          description: 配信方法
        templateName:
          type: string
          description: テンプレート名
        subject:
          type: string
          description: 件名
        deliveryCount:
          type: number
          description: 配信数
        openCount:
          type: number
          description: 開封数
        clickCount:
          type: number
          description: クリック数
        cvCount:
          type: number
          description: CV数
      required:
        - deliveryYearMonth
        - deliveryWeek
        - deliveryDate
        - scenarioName
        - segment
        - deliveryMethod
        - templateName
        - subject
        - deliveryCount
        - openCount
        - clickCount
        - cvCount

    NewsletterSyncResult:
      type: object
      properties:
        rowCount:
          type: number
          description: Number of rows synced
        syncedAt:
          type: string
          description: ISO timestamp of sync
      required:
        - rowCount
        - syncedAt

    NewsletterMetrics:
      type: object
      properties:
        label:
          type: string
          description: Group label (date, week, month, or template name)
        subject:
          type: ["string", "null"]
          description: 件名（テンプレ別・日別など行レベルで意味を持つ場合）
        segment:
          type: ["string", "null"]
          description: セグメント名（セグメント別集計の場合）
        deliveryCount:
          type: number
        openCount:
          type: number
        clickCount:
          type: number
        cvCount:
          type: number
        openRate:
          type: number
          description: Open rate (openCount / deliveryCount)
        clickRate:
          type: number
          description: Click rate (clickCount / deliveryCount)
        cvr:
          type: number
          description: Conversion rate (cvCount / deliveryCount)
        prevDeliveryCount:
          type: ["number", "null"]
          description: 前期間の配信数
        prevOpenRate:
          type: ["number", "null"]
          description: 前期間の開封率
        prevClickRate:
          type: ["number", "null"]
          description: 前期間のクリック率
        prevCvr:
          type: ["number", "null"]
          description: 前期間のCVR
      required:
        - label
        - deliveryCount
        - openCount
        - clickCount
        - cvCount
        - openRate
        - clickRate
        - cvr

    NewsletterSegmentGroup:
      type: object
      properties:
        segment:
          type: string
          description: セグメント名
        items:
          type: array
          items:
            $ref: "#/components/schemas/NewsletterMetrics"
        summary:
          $ref: "#/components/schemas/NewsletterMetrics"
      required:
        - segment
        - items
        - summary

    NewsletterReportResponse:
      type: object
      properties:
        groupBy:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/NewsletterMetrics"
        segmentGroups:
          type: array
          items:
            $ref: "#/components/schemas/NewsletterSegmentGroup"
          description: セグメント別グループ（セグメントフィルタ複数指定時）
        summary:
          $ref: "#/components/schemas/NewsletterMetrics"
        lastSyncedAt:
          type: ["string", "null"]
        availableSegments:
          type: array
          items:
            type: string
          description: 選択可能なセグメント一覧
      required:
        - groupBy
        - items
        - summary
        - lastSyncedAt
        - availableSegments

    NewsletterSegmentsResponse:
      type: object
      properties:
        segments:
          type: array
          items:
            type: string
      required:
        - segments

    NewsletterChangeEvent:
      type: object
      properties:
        date:
          type: string
          description: 変更日 (YYYY/MM/DD)
        type:
          type: string
          enum: [subject, template]
          description: 変更種別（subject=件名変更, template=テンプレート変更）
        scenarioName:
          type: string
          description: シナリオ名
        before:
          type: string
          description: 変更前の値
        after:
          type: string
          description: 変更後の値
      required:
        - date
        - type
        - scenarioName
        - before
        - after

    NewsletterChangeEventsResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/NewsletterChangeEvent"
      required:
        - events

    ClarityAdCodeEntry:
      type: object
      properties:
        adCode:
          type: string
          description: Ad code identifier
        devices:
          type: array
          items:
            type: string
          description: Available devices (Desktop, Mobile)
      required:
        - adCode
        - devices

    ClarityFilesResponse:
      type: object
      properties:
        dates:
          type: array
          items:
            type: string
          description: Available date folders
        adCodes:
          type: array
          items:
            $ref: "#/components/schemas/ClarityAdCodeEntry"
          description: Available ad codes with their devices
      required:
        - dates
        - adCodes

    ClarityScrollPoint:
      type: object
      properties:
        depth:
          type: number
          description: Scroll depth percentage (5, 10, ..., 100)
        desktop:
          type: ["number", "null"]
          description: Visitor count at this depth for Desktop
        mobile:
          type: ["number", "null"]
          description: Visitor count at this depth for Mobile
      required:
        - depth
        - desktop
        - mobile

    ClarityScrollResponse:
      type: object
      properties:
        adCode:
          type: string
        date:
          type: string
        points:
          type: array
          items:
            $ref: "#/components/schemas/ClarityScrollPoint"
        pageViews:
          type: object
          additionalProperties:
            type: number
          description: Page view counts per device (e.g. { Desktop: 2, Mobile: 5 })
      required:
        - adCode
        - date
        - points
        - pageViews

    EfoFilters:
      type: object
      properties:
        profileNames:
          type: array
          items:
            type: string
          description: Unique profile names
        adCodes:
          type: array
          items:
            type: string
          description: Unique ad codes
      required:
        - profileNames
        - adCodes

    EfoSyncResult:
      type: object
      properties:
        accessCvRowCount:
          type: number
        exitScenarioRowCount:
          type: number
        syncedAt:
          type: string
      required:
        - accessCvRowCount
        - exitScenarioRowCount
        - syncedAt

    EfoMetrics:
      type: object
      properties:
        label:
          type: string
        accessCount:
          type: number
          description: チャット起動数
        cvCount:
          type: number
        cvr:
          type: number
          description: チャット内CVR (cvCount / accessCount)
        lpAccessCount:
          type: number
          nullable: true
          description: LPアクセス数（ecf_ad_access_cvより）
        chatLaunchRate:
          type: number
          nullable: true
          description: チャット起動率 (accessCount / lpAccessCount)
        lpCvr:
          type: number
          nullable: true
          description: LP CVR (cvCount / lpAccessCount)
      required:
        - label
        - accessCount
        - cvCount
        - cvr

    EfoExitScenarioCount:
      type: object
      properties:
        scenario:
          type: string
        count:
          type: number
      required:
        - scenario
        - count

    EfoReportResponse:
      type: object
      properties:
        groupBy:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/EfoMetrics"
        summary:
          $ref: "#/components/schemas/EfoMetrics"
        exitScenarios:
          type: array
          items:
            $ref: "#/components/schemas/EfoExitScenarioCount"
          description: 離脱シナリオ別件数（ファネル順）
        lastSyncedAt:
          type: ["string", "null"]
      required:
        - groupBy
        - items
        - summary
        - exitScenarios
        - lastSyncedAt

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List all campaigns
      responses:
        "200":
          description: Campaign list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignListResponse"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaigns/{id}:
    put:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /efo/presets:
    get:
      operationId: listEfoPresets
      tags: [efo]
      summary: List all EFO presets
      responses:
        "200":
          description: Preset list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfoPresetListResponse"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createEfoPreset
      tags: [efo]
      summary: Create an EFO preset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EfoPresetInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EfoPresetResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /efo/presets/{id}:
    delete:
      operationId: deleteEfoPreset
      tags: [efo]
      summary: Delete an EFO preset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    Campaign:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        memo:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - startDate
        - endDate
        - createdAt
        - updatedAt

    CampaignInput:
      type: object
      properties:
        title:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        memo:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
      required:
        - title
        - startDate
        - endDate

    CampaignListResponse:
      type: object
      properties:
        campaigns:
          type: array
          items:
            $ref: "#/components/schemas/Campaign"
      required:
        - campaigns

    CampaignResponse:
      type: object
      properties:
        campaign:
          $ref: "#/components/schemas/Campaign"
      required:
        - campaign

    EfoPresetSegment:
      type: object
      properties:
        dateFrom:
          type: ["string", "null"]
        dateTo:
          type: ["string", "null"]
        profileNames:
          type: array
          items:
            type: string
        adCodes:
          type: array
          items:
            type: string
      required:
        - profileNames
        - adCodes

    EfoPreset:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        groupBy:
          type: string
        segmentA:
          $ref: "#/components/schemas/EfoPresetSegment"
        segmentB:
          $ref: "#/components/schemas/EfoPresetSegment"
        createdAt:
          type: string
      required:
        - id
        - name
        - groupBy
        - segmentA
        - segmentB
        - createdAt

    EfoPresetInput:
      type: object
      properties:
        name:
          type: string
        groupBy:
          type: string
        segmentA:
          $ref: "#/components/schemas/EfoPresetSegment"
        segmentB:
          $ref: "#/components/schemas/EfoPresetSegment"
      required:
        - name
        - groupBy
        - segmentA
        - segmentB

    EfoPresetListResponse:
      type: object
      properties:
        presets:
          type: array
          items:
            $ref: "#/components/schemas/EfoPreset"
      required:
        - presets

    EfoPresetResponse:
      type: object
      properties:
        preset:
          $ref: "#/components/schemas/EfoPreset"
      required:
        - preset
